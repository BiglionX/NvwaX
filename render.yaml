services:
  - type: web
    name: nvwax-backend
    env: node
    buildCommand: cd packages/nvwax-server && npm install && npm run build
    startCommand: node packages/nvwax-server/dist/index.js
    rootDir: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: nvwax-db
          property: connectionString

databases:
  - name: nvwax-db
    databaseName: nvwax
    user: nvwax
